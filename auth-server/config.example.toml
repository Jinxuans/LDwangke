[server]
host = "0.0.0.0"
port = 9800
# JWT 签名密钥，部署时务必修改
jwt_secret = "change-me-to-a-strong-jwt-secret"
# JWT 过期时间（小时）
jwt_expire_hours = 72

[security]
# 客户端签名密钥，编译进客户端二进制，部署时务必修改
client_secret = "change-me-client-secret"
# 签名时间窗口（秒），防重放攻击
sign_window_secs = 300
# 验证结果内存缓存时间（秒）
verify_cache_secs = 300
# 超过此秒数无心跳视为离线
offline_threshold_secs = 1800
# 默认最大换绑次数
max_default_bind = 3

[database]
path = "data/license.db"

[super_admin]
# 超级管理员账号，首次启动时自动创建
username = "admin"
password = "change-me"
