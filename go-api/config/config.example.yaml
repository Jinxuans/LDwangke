server:
  port: 8080
  mode: release  # debug / release
  php_backend: "http://127.0.0.1:9000"  # PHP 后端地址（Go代理用）
  php_public_url: ""                     # PHP 公网地址（浏览器iframe用），留空=同域相对路径
  bridge_secret: "change-me"             # iframe 认证桥接签名密钥（与 auth_bridge.php 一致）

database:
  host: 127.0.0.1
  port: 3306
  user: your_db_user
  password: "your_db_password"
  dbname: "your_db_name"
  max_open_conns: 50
  max_idle_conns: 25

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "change-me-to-a-strong-secret"
  access_ttl: 604800     # 7天
  refresh_ttl: 2592000   # 30天

cache:
  order_list_ttl: 30     # 订单列表缓存30秒
  class_list_ttl: 300    # 课程列表缓存5分钟

license:
  server_url: "https://auth.qingka.top"      # 授权站地址
  license_key: ""                              # 授权码（留空则从 key_file 读取）
  key_file: "/www/wwwroot/qingka/license.key"  # 授权码文件路径
  domain: ""                                   # 当前站点域名（宝塔插件自动写入）
  cache_file: ".sys_state"                     # 离线缓存文件
  secrets_file: ".secrets"                     # 密钥文件（宝塔插件部署时自动生成）

smtp:
  host: "smtp.qq.com"              # QQ: smtp.qq.com | 163: smtp.163.com
  port: 465                        # SSL: 465 | STARTTLS: 587
  user: ""                         # 发件邮箱地址
  password: ""                     # 邮箱授权码（非登录密码）
  from_name: "系统通知"             # 发件人显示名
  encryption: "ssl"                # ssl | starttls | none

security:
  allow_legacy_plaintext_passwords: true   # 为平滑迁移保留明文密码自动升级能力；可通过环境变量禁用

bootstrap:
  create_default_admin: false              # 默认不再在启动期自动创建 admin/admin123
  auto_migrate: true                       # 启动时自动执行 go-api/migrations/core 下的增量 SQL
  migrations_dir: "migrations/core"       # 核心迁移目录，留空时按工作目录/可执行文件目录自动探测

# 可通过环境变量覆盖关键配置，例如：
# GO_API_SERVER_PORT=8081
# GO_API_DATABASE_HOST=127.0.0.1
# GO_API_DATABASE_PASSWORD=your_password
# GO_API_JWT_SECRET=your_secret
# GO_API_SECURITY_ALLOW_LEGACY_PLAINTEXT_PASSWORDS=false
# GO_API_BOOTSTRAP_CREATE_DEFAULT_ADMIN=true
# GO_API_BOOTSTRAP_AUTO_MIGRATE=false
# GO_API_BOOTSTRAP_MIGRATIONS_DIR=/www/wwwroot/go-api/migrations/core
