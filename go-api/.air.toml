root = "."
tmp_dir = "bin"

[build]
  cmd = "go build -o ./bin/go-api.exe ./cmd/server/main.go"
  bin = "./bin/go-api.exe"
  include_ext = ["go", "yaml", "yml", "sql"]
  include_dir = ["cmd", "config", "internal", "migrations"]
  exclude_dir = ["bin", ".git", ".gocache", "deploy", "docs", "node_modules"]
  exclude_file = []
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = true

[misc]
  clean_on_exit = true
